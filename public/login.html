<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>CreativityLab — Вход</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .auth-card { 
        max-width: 400px; 
        margin: 60px auto; 
        padding: 32px; 
        border-radius: 20px; 
        box-shadow: var(--card-shadow); 
        background: var(--bg); 
        opacity: 0; 
        transform: translateY(20px); 
        transition: all 0.4s ease; 
    }
    .auth-card.show { opacity: 1; transform: translateY(0); }
    
    .input-group { margin-bottom: 20px; }
    .input-group label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.9rem; color: var(--text); }
    .input-group input { 
        width: 100%; padding: 12px 16px; border-radius: 12px; 
        border: 1px solid rgba(15,23,42,0.1); font-size: 1rem; transition: all 0.2s;
    }
    .input-group input:focus { outline: none; border-color: var(--accent); }
    
    .error-banner {
        background: #fff5f5; border: 1px solid #fed7d7; color: #c53030;
        padding: 10px; border-radius: 8px; font-size: 0.9rem; margin-bottom: 20px;
        display: none; text-align: center;
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="container nav">
      <a class="logo" href="index.html">CreativityLab</a>
      <nav class="nav-links"><a href="index.html">На главную</a></nav>
    </div>
  </header>

  <main class="section padded">
    <div class="container">
      <article class="auth-card" id="loginCard">
        <header style="margin-bottom: 24px; text-align: center;">
            <h2 style="font-size: 1.6rem; margin-bottom: 8px;">С возвращением!</h2>
            <p style="color: var(--muted);">Войдите, чтобы продолжить</p>
        </header>

        <div id="errorMsg" class="error-banner">Неверный логин или пароль</div>

        <form id="loginForm">
          <div class="input-group">
            <label for="loginInput">Email или Имя пользователя</label>
            <input type="text" id="loginInput" placeholder="ivan@mail.com или ivan_ivanov" required>
          </div>

          <div class="input-group">
            <label for="loginPass">Пароль</label>
            <input type="password" id="loginPass" placeholder="••••••••" required>
          </div>

          <button type="submit" class="btn-primary" style="width: 100%; padding: 14px; font-size: 1rem; margin-top: 10px;">
            Войти
          </button>
          
          <div style="text-align:center; margin-top:20px; font-size:0.9rem;">
            Нет аккаунта? <a href="reg.html" style="color:var(--accent); text-decoration:none; font-weight:600;">Зарегистрироваться</a>
          </div>
        </form>
      </article>
    </div>
  </main>

  <script>
    window.addEventListener('DOMContentLoaded', () => {
        document.getElementById('loginCard').classList.add('show');
    });

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = e.target.querySelector('button');
        const errorBanner = document.getElementById('errorMsg');
        
        const login = document.getElementById('loginInput').value;
        const pass = document.getElementById('loginPass').value;

        btn.disabled = true;
        btn.innerText = "Проверка...";
        errorBanner.style.display = 'none';

        try {
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ login, pass })
            });
            
            const data = await res.json();

            if (data.success) {
                localStorage.setItem('authToken', data.token);
                window.location.href = 'index.html';
            } else {
                errorBanner.innerText = data.error || "Ошибка входа";
                errorBanner.style.display = 'block';
                btn.disabled = false;
                btn.innerText = "Войти";
            }
        } catch (err) {
            errorBanner.innerText = "Ошибка соединения с сервером";
            errorBanner.style.display = 'block';
            btn.disabled = false;
            btn.innerText = "Войти";
        }
    });
  </script>
</body>
</html>
